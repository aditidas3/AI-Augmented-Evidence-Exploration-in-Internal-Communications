# =============================================================================
# pre_kg_config.yaml
# =============================================================================
#
# HOW THIS WORKS:
#   1. Edit this file to change any rule behaviour.
#   2. Feed this file to an LLM with the prompt at the bottom.
#   3. The LLM generates rule_engine.py from these rules.
#   4. pre_kg_rules.py imports rule_engine.py and runs the pipeline.
#
# RULE SEVERITY:
#   violation  -> blocks pipeline, must be fixed before loading
#   warning    -> logged only, pipeline continues
#
# **To disable any rule: set  enabled: false**
# =============================================================================


# ---------------------------------------------------------------------------
# RULE SET A — apply_structural_integrity
# Every record must have the right shape before anything else runs.
# ---------------------------------------------------------------------------
rule_set_structural_integrity:

  A1:
    enabled: true
    severity: violation
    description: >
      Every record must have a non-empty top-level 'id' field.
      If missing, auto-generate one using sha256(file_type + record_index) and flag violation.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    field: id
    auto_fix: true

  A2:
    enabled: true
    severity: violation
    description: >
      Every record must have an 'output' object (dict).
      If missing or wrong type, replace with empty dict and flag violation.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    field: output
    auto_fix: true

  A3:
    enabled: true
    severity: violation
    description: >
      EMAIL records must have a non-empty hasPart list with at least one item.
      Required for graph loading.
    applies_to: [EMAIL]
    required_fields:
      - hasPart                     # must be list, length >= 1

  A4:
    enabled: false
    severity: warning
    description: >
      Records must have these fields present and non-empty inside output.
      Disabled — these fields are populated by the metadata pipeline after
      LLM extraction and before KG loading. Re-enable once that stage runs.
    applies_to: [DOC, PPT, XLS, TXT]
    required_fields:
      - url
      - industry
      - collection

  A5:
    enabled: true
    severity: warning
    description: >
      Records must have hasContent present and non-empty inside output.
    applies_to: [PPT, XLS, TXT]
    required_fields:
      - hasContent


# ---------------------------------------------------------------------------
# RULE SET B — apply_format_normalization
# Coerce values into consistent types/formats before UID assignment.
# ---------------------------------------------------------------------------
rule_set_format_normalization:

  B1:
    enabled: true
    severity: warning
    description: >
      Normalize all date fields to ISO YYYY-MM-DD format.
      Try each input format in order; keep original string if none match.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    date_fields:
      - documentDate
      - dateAdded
      - dateFiled
    nested_date_fields:
      - array_path: hasPart
        field: dateSent
    accepted_input_formats:
      - "%Y-%m-%d"
      - "%Y-%m-%dT%H:%M:%S"
      - "%Y-%m-%dT%H:%M"
      - "%m/%d/%Y"
      - "%d/%m/%Y"
    output_format: "%Y-%m-%d"

  B2:
    enabled: true
    severity: warning
    description: >
      Validate and lowercase all email address fields.
      An email is valid if it matches [^@]+@[^@]+\.[^@]+
      Invalid emails are blanked out and a warning is raised.
      contacts[] is present on DOC and TXT only.
    applies_to: [DOC, EMAIL, TXT]
    contact_email_field: email
    message_sender_path: hasPart[].sender.email
    message_recipient_path: hasPart[].recipient[].email
    on_invalid: blank

  B3:
    enabled: true
    severity: warning
    description: >
      Validate URLs. A URL is valid only if it starts with http:// or https://.
      Invalid URLs are blanked out.
    applies_to: [DOC, PPT, TXT, XLS]
    url_fields:
      - url
    nested_url_fields:
      - links[].url
      - contacts[].url
    on_invalid: blank

  B4:
    enabled: true
    severity: warning
    description: >
      Normalize the 'language' field to a lowercase plain string.
      If the value is a list, take the first element and lowercase it.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    field: language
    normalize: lowercase_string

  B5:
    enabled: true
    severity: warning
    description: >
      Coerce sourceFile.pageCount to int. Skips empty values silently.
      EMAIL records are excluded.
    applies_to: [DOC, PPT, XLS, TXT]
    field: sourceFile.pageCount
    coerce_to: integer
    skip_empty: true


# ---------------------------------------------------------------------------
# RULE SET C — apply_uid_assignment
# ---------------------------------------------------------------------------
rule_set_uid_assignment:

  C1:
    enabled: true
    description: >
      Assign _uid to every item in output.contacts[].
      contacts[] is present on DOC and TXT only.
      Key preference: use email if valid, otherwise concatenate name+organization.
    applies_to: [DOC, TXT]
    path: output.contacts[]
    uid_field: _uid
    uid_namespace: contact
    key_preference:
      - email
      - name+organization

  C2:
    enabled: true
    description: >
      Assign _uid to every email message in output.hasPart[].
      Key: sha256(subject + dateSent).
    applies_to: [EMAIL]
    path: output.hasPart[]
    uid_field: _uid
    uid_namespace: email_msg
    key_fields:
      - subject
      - dateSent

  C3:
    enabled: true
    description: >
      Assign _uid to sender and each recipient inside every hasPart message.
      Key preference: use email if valid, otherwise use name.
    applies_to: [EMAIL]
    uid_field: _uid
    uid_namespace: person
    paths:
      - output.hasPart[].sender
      - output.hasPart[].recipient[]
    key_preference:
      - email
      - name

  C4:
    enabled: true
    description: >
      Assign _uid to drug entities across all document types.
      Paths: hasContent[].entities.drugs[], hasPart[].entities.drugs[],
      and hasContent.slides[].entities.drugs[].
      Key: lowercased name.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    uid_field: _uid
    uid_namespace: drug
    paths:
      - output.hasContent[].entities.drugs[]
      - output.hasPart[].entities.drugs[]
      - output.hasContent.slides[].entities.drugs[]
    key_preference:
      - name

  C5:
    enabled: true
    description: >
      Assign _uid to organization objects across all document types.
      organizations[] is an array of dicts with a 'name' field.
      Paths: hasContent[].entities.organizations[],
      hasPart[].entities.organizations[],
      and hasContent.slides[].entities.organizations[].
      Key: sha256("org" + lowercased name).
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    paths:
      - output.hasContent[].entities.organizations[]
      - output.hasPart[].entities.organizations[]
      - output.hasContent.slides[].entities.organizations[]
    uid_field: _uid
    uid_namespace: org
    key_field: name
    key_normalize: lowercase

  C6:
    enabled: true
    description: >
      Assign _doc_uid to the record itself (the Document node uid).
      Keyed on record id only — this is always present and stable across all
      pipeline stages. bates_number and url are not used as uid keys because
      they are populated at a later metadata stage; using them would produce
      a different uid after enrichment and break the Neo4j MERGE key.
      Store at rec['_doc_uid'] (top-level, not inside output).
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    uid_field: _doc_uid
    uid_namespace: doc
    key_preference:
      - id

  C7:
    enabled: true
    description: >
      Assign _uid to each object in output.author[].
      author[] is an array of objects with name, organization, email, phone, address.
      Key preference: email if valid, otherwise name+organization.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    path: output.author[]
    uid_field: _uid
    uid_namespace: person
    key_preference:
      - email
      - name+organization


# ---------------------------------------------------------------------------
# RULE SET D — apply_graph_semantics
# Validate values that directly affect graph structure.
# ---------------------------------------------------------------------------
rule_set_graph_semantics:

  D1:
    enabled: true
    description: >
      Normalise contact_type to lowercase on all contacts[].
      No enum restriction — the LLM may assign any descriptive role
      (individual, organization, author, sender, signatory, etc.) and all are valid.
      Defaults to 'individual' if the field is empty.
    applies_to: [DOC, TXT]
    field: output.contacts[].contact_type
    normalize: lowercase
    default_on_empty: individual

  D2:
    enabled: true
    description: >
      Normalise legalFramework.type to lowercase.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    field: output.legalFramework.type
    normalize: lowercase

  D3:
    enabled: false
    description: >
      Checks whether sender _uid equals any recipient _uid within a hasPart message.
    applies_to: [EMAIL]
    path: output.hasPart[]
    check: sender._uid != each recipient._uid

  D4:
    enabled: true
    severity: warning
    description: >
      Every item in output.claims[] must have a non-empty 'subject' field.
      If missing, auto-fill from the first 60 chars of claim_text.
      If claim_text is also missing, use the fallback string.
    applies_to: [DOC]
    path: output.claims[]
    field: subject
    auto_fix: true
    fallback_source: claim_text
    fallback_truncate: 60
    fallback_default: unknown_subject

  D5:
    enabled: true
    severity: warning
    description: >
      Within a single PPT record, every slide in hasContent.slides[]
      must have a unique pageNumber. Duplicates indicate extraction errors.
    applies_to: [PPT]
    path: output.hasContent.slides[]
    unique_field: pageNumber

  D6:
    enabled: true
    severity: warning
    description: >
      Finance values in hasContent[].entities.finances[] should be stored as floats
      for numeric querying. Strip commas before coercion (e.g. "1,200.50" -> 1200.50).
      If coercion fails, keep the original value without warning.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    path: output.hasContent[].entities.finances[]
    field: finance_string
    coerce_to: float
    strip_chars: ","


# ---------------------------------------------------------------------------
# RULE SET E — apply_dedup_normalization
# Normalize entity values for consistent string matching and UID generation.
# ---------------------------------------------------------------------------
rule_set_dedup_normalization:

  E1:
    enabled: true
    description: >
      Deduplicate output.abbreviations[] by abbv_name within each record.
      Comparison is case-insensitive. Keep the first occurrence.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    path: output.abbreviations[]
    dedup_key: abbv_name
    dedup_normalize: uppercase

  E2:
    enabled: true
    description: >
      Normalize topic_string in hasContent[].entities.topics[] to title-case
      after stripping leading/trailing whitespace.
      Ensures the same topic mentioned with different casing merges to one node.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    path: output.hasContent[].entities.topics[]
    field: topic_string
    normalize:
      - strip
      - title_case

  E3:
    enabled: true
    description: >
      Normalize the name field on organization objects by collapsing internal
      whitespace runs to a single space and stripping ends.
      Applies across all paths where organizations[] appears.
    applies_to: [DOC, EMAIL, PPT, XLS, TXT]
    paths:
      - output.hasContent[].entities.organizations[]
      - output.hasPart[].entities.organizations[]
      - output.hasContent.slides[].entities.organizations[]
    field: name
    normalize:
      - collapse_whitespace
      - strip


# ---------------------------------------------------------------------------
# RULE SET F — apply_txt_rules
# TXT-specific rules for tabular and structural content.
# ---------------------------------------------------------------------------
rule_set_txt_rules:

  F1:
    enabled: true
    description: >
      TXT records must have output.sourceFile.fileName (warning if missing)
      and output.hasContent must be a non-empty list (violation if empty).
    applies_to: [TXT]
    checks:
      - field: output.sourceFile.fileName
        severity: warning
      - field: output.hasContent
        must_be_nonempty_list: true
        severity: violation

  F2:
    enabled: false
    description: >
      Checks that every item in output.hasContent[] has a non-empty 'title'.
    applies_to: [TXT]
    path: output.hasContent[]
    required_field: title

  F3:
    enabled: true
    severity: warning
    description: >
      Normalize creationDate and submittedDate inside each output.hasContent[] item
      to ISO YYYY-MM-DD format.
    applies_to: [TXT]
    path: output.hasContent[]
    date_fields:
      - creationDate
      - submittedDate
    accepted_input_formats:
      - "%Y-%m-%d"
      - "%Y-%m-%dT%H:%M:%S"
      - "%m/%d/%Y"

  F4:
    enabled: true
    severity: warning
    description: >
      Coerce rowCount and columnCount inside hasContent[].tabular.dimensions to int.
      Required as integers for TabularColumn node creation.
    applies_to: [TXT]
    path: output.hasContent[].tabular.dimensions
    integer_fields:
      - rowCount
      - columnCount

  F5:
    enabled: true
    severity: warning
    description: >
      Scan all cell values in hasContent[].tabular.rows[].values for the UCSF
      redaction marker. Count total redacted cells and set _has_redactions on
      each hasContent item for use as the TextContent.hasRedactions node property.
    applies_to: [TXT]
    path: output.hasContent[].tabular.rows[].values
    redaction_marker: "UCSF Redaction"
    flag_field: _has_redactions

  F6:
    enabled: true
    severity: warning
    description: >
      Validate and lowercase inferredType for every column in
      hasContent[].tabular.columns[]. Unknown types are flagged but kept.
    applies_to: [TXT]
    path: output.hasContent[].tabular.columns[]
    field: inferredType
    normalize: lowercase
    allowed_values:
      - string
      - integer
      - number
      - float
      - boolean
      - date
      - datetime
      - email
      - url
      - "null"
      - unknown
      - ""

  F8:
    enabled: true
    description: >
      Assign a stable _uid to each item in output.hasContent[] for TXT.
      Key: sha256("txt_content" + textDocumentId + item_index).
      This becomes the TextContent node uid in Neo4j.
    applies_to: [TXT]
    path: output.hasContent[]
    uid_field: _uid
    uid_namespace: txt_content
    key_field: textDocumentId

  F9:
    enabled: true
    description: >
      Assign _uid to each organization object inside hasContent[].entities.organizations[]
      for TXT records. Key: sha256("org" + lowercased name).
    applies_to: [TXT]
    path: output.hasContent[].entities.organizations[]
    uid_field: _uid
    uid_namespace: org
    key_field: name
    key_normalize: lowercase

  F10:
    enabled: true
    description: >
      Strip trailing commas and collapse internal whitespace in organization name
      strings inside hasContent[].entities.organizations[] for TXT records.
      Catches artifacts from CSV extraction.
    applies_to: [TXT]
    path: output.hasContent[].entities.organizations[]
    field: name
    normalize:
      - collapse_whitespace
      - strip
      - rstrip_chars: ","


# =============================================================================
# LLM GENERATION PROMPT
# =============================================================================
# To regenerate rule_engine.py from this file, send this file to an LLM
# with the following prompt:
#
#   "You are a Python code generator. Read the YAML rule definitions below.
#    Generate a Python module called rule_engine.py that implements every
#    enabled rule exactly as described.
#
#    Requirements:
#    - The module must expose: apply_all_rules(rec, idx, file_type) -> rec
#    - It must also expose module-level lists: VIOLATIONS, WARNINGS
#    - And a module-level dict: STATS (defaultdict(int))
#    - Use helper functions _str(), _ok(), _list(), _stable_id(), _norm_date(),
#      _clean_email(), _clean_url() as internal helpers
#
#    FUNCTION NAMES — use the rule set names from this YAML exactly:
#    - rule_set_structural_integrity  -> def apply_structural_integrity(rec, rid, file_type)
#    - rule_set_format_normalization  -> def apply_format_normalization(rec, rid, file_type)
#    - rule_set_uid_assignment        -> def apply_uid_assignment(rec, rid, file_type)
#    - rule_set_graph_semantics       -> def apply_graph_semantics(rec, rid, file_type)
#    - rule_set_dedup_normalization   -> def apply_dedup_normalization(rec, rid, file_type)
#    - rule_set_txt_rules             -> def apply_txt_rules(rec, rid)
#
#    EXECUTION ORDER in apply_all_rules():
#      apply_structural_integrity
#      -> apply_format_normalization
#      -> apply_uid_assignment
#      -> apply_graph_semantics
#      -> apply_dedup_normalization
#      -> apply_txt_rules  (only when file_type == 'TXT')
#
#    ABOUT applies_to:
#    - 'applies_to' lists document type tags, NOT filenames.
#    - The caller passes file_type as a short tag (e.g. 'DOC', 'EMAIL', 'TXT').
#    - Each rule must check whether file_type is in its applies_to list.
#
#    - Each rule respects its enabled flag
#    - Violations appended to VIOLATIONS; warnings to WARNINGS
#    - Return the modified record at end of apply_all_rules()
#    - Do not import yaml — all rule parameters baked into Python code
#    - Standalone, importable, no external dependencies beyond stdlib"
# =============================================================================
